<svg width="480" height="600" viewBox="0 0 480 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="hoodieGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#d4d4d4"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2a1f"/>
      <stop offset="100%" stop-color="#2a1d15"/>
    </linearGradient>
    <linearGradient id="headphoneGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8A2BE2"/>
      <stop offset="100%" stop-color="#6a1fb2"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#8A2BE2" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8A2BE2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="480" height="600" fill="url(#bgGrad)"/>

  <!-- purple glow behind -->
  <circle cx="240" cy="260" r="220" fill="url(#glow)"/>

  <!-- hoodie body -->
  <path d="M 90 600 L 90 480 Q 90 380 180 350 L 300 350 Q 390 380 390 480 L 390 600 Z" fill="url(#hoodieGrad)"/>

  <!-- hoodie hood back -->
  <path d="M 170 360 Q 240 280 310 360 L 310 410 Q 240 390 170 410 Z" fill="#e5e5e5"/>

  <!-- shoulders shading -->
  <path d="M 90 480 Q 240 440 390 480 L 390 600 L 90 600 Z" fill="#1a1a1a" opacity="0.15"/>

  <!-- neck -->
  <rect x="210" y="300" width="60" height="80" fill="url(#faceGrad)"/>

  <!-- head -->
  <ellipse cx="240" cy="230" rx="90" ry="105" fill="url(#faceGrad)"/>

  <!-- hair (short, dark) -->
  <path d="M 150 200 Q 160 120 240 110 Q 320 120 330 200 Q 320 160 240 150 Q 160 160 150 200 Z" fill="#1a0f08"/>

  <!-- headphones band -->
  <path d="M 150 180 Q 240 100 330 180" stroke="url(#headphoneGrad)" stroke-width="14" fill="none" stroke-linecap="round"/>

  <!-- headphone left cup -->
  <ellipse cx="148" cy="220" rx="22" ry="32" fill="url(#headphoneGrad)"/>
  <ellipse cx="148" cy="220" rx="14" ry="22" fill="#2a0a4a"/>

  <!-- headphone right cup -->
  <ellipse cx="332" cy="220" rx="22" ry="32" fill="url(#headphoneGrad)"/>
  <ellipse cx="332" cy="220" rx="14" ry="22" fill="#2a0a4a"/>

  <!-- subtle face features (minimal, premium) -->
  <!-- eyes -->
  <ellipse cx="210" cy="225" rx="6" ry="3" fill="#0a0a0a"/>
  <ellipse cx="270" cy="225" rx="6" ry="3" fill="#0a0a0a"/>

  <!-- slight smile -->
  <path d="M 220 275 Q 240 285 260 275" stroke="#0a0a0a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- hoodie strings -->
  <line x1="225" y1="370" x2="225" y2="450" stroke="#999" stroke-width="2.5"/>
  <line x1="255" y1="370" x2="255" y2="450" stroke="#999" stroke-width="2.5"/>
  <circle cx="225" cy="455" r="5" fill="#888"/>
  <circle cx="255" cy="455" r="5" fill="#888"/>

  <!-- hoodie pocket -->
  <path d="M 170 480 L 310 480 L 290 540 L 190 540 Z" fill="none" stroke="#aaa" stroke-width="1.5" opacity="0.5"/>

  <!-- subtle accent line on hoodie -->
  <line x1="240" y1="360" x2="240" y2="600" stroke="#bbb" stroke-width="1" opacity="0.4"/>
</svg>
